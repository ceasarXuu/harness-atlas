<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="scanline" aria-hidden="true"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="pixel-logo" aria-hidden="true"></span>
        <span>Harness Atlas</span>
      </a>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}">中文</a>
        <a href="{{ '/en/' | relative_url }}">EN</a>
        <a href="https://github.com/ceasarXuu/harness-atlas">GitHub</a>
      </nav>
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>CC BY 4.0 / MIT</span>
      <span>ceasarXuu</span>
    </footer>
  </div>
</body>
</html>
